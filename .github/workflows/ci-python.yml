name: CI - Python SDK

on:
  push:
    branches: [main]
    paths: ['master_security_python/**']
  pull_request:
    branches: [main]
    paths: ['master_security_python/**']

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.14', '3.15']
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          cd master_security_python
          pip install -e ".[dev]"
      - name: Lint with ruff
        run: |
          cd master_security_python
          ruff check src/
      - name: Type check with mypy
        run: |
          cd master_security_python
          mypy src/
      - name: Run tests
        run: |
          cd master_security_python
          pytest tests/ -v --cov=master_security --cov-report=xml
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: master_security_python/coverage.xml

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Bandit security scan
        run: |
          pip install bandit
          bandit -r master_security_python/src/ -f json -o bandit-report.json
      - name: Generate SBOM
        run: |
          pip install cyclonedx-bom
          cd master_security_python
          cyclonedx-py -o sbom.json

  publish:
    needs: [test, security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
      - name: Build package
        run: |
          cd master_security_python
          pip install build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: master_security_python/dist/
